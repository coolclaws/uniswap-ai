name: Publish MCP to npm

on:
  push:
    tags:
      - 'mcp-v*'   # trigger: git tag mcp-v0.1.0 && git push origin mcp-v0.1.0

jobs:
  publish:
    name: Publish @uniswap-ai/mcp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/mcp/uniswap-mcp

      - name: Build
        run: npm run build
        working-directory: packages/mcp/uniswap-mcp

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/mcp/uniswap-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
